# Training parameters
max_epoch: 0
resume_epoch: 0

# Model parameters
lpr_max_len: 8
dropout_rate: 0.5
class_num: 37  # len(CHARS)

# Dataset paths
train_img_dirs: "data\\train"
test_img_dirs: "~/workspace/testMixLPR"

# Training configuration
train_batch_size: 128
test_batch_size: 120
num_workers: 0

# Optimizer parameters
learning_rate: 0.01
momentum: 0.9
weight_decay: 0.00002
optimizer: "RMSprop"  # or "SGD"
rmsprop_alpha: 0.9
rmsprop_eps: 0.00000001

# Learning rate schedule
lr_schedule: [4, 8, 12, 14, 16]

# Checkpoint and evaluation
save_interval: 2000
test_interval: 2000
save_folder: "./weights/"
pretrained_model: "./weights/last.pth"  # or path to pretrained model

# Device
cuda: true