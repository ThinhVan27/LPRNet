# Training parameters
max_epoch: 0
resume_epoch: 0

# Model parameters
lpr_max_len: 7
dropout_rate: 0.5
class_num: 37  # len(CHARS)

# Dataset paths
train_img_dirs: "data\\train"
test_img_dirs: "~/workspace/testMixLPR"

# Training configuration
train_batch_size: 256
test_batch_size: 128
num_workers: 0

# Optimizer parameters
learning_rate: 0.01
weight_decay: 0.00005
optimizer: "Adam"

# LR Scheduler
gamma: 0.95

# Checkpoint and evaluation
save_interval: 2000
test_interval: 2000
save_folder: "./weights/"
pretrained_model: "weights\\last.pth"  # or path to pretrained model

# Device
cuda: true